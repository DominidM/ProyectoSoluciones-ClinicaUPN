<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/paciente-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
                <h2 class="text-2xl font-bold text-ink">Especialidades disponibles</h2>
                <p class="mt-1 text-sm text-muted">Consulta nuestras áreas de atención presencial y solicita tu cita cuando la necesites.</p>
            </div>
            <a th:href="@{/paciente/solicitar-cita}" class="inline-flex items-center gap-2 rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">
                <i data-lucide="calendar-plus" class="h-4 w-4"></i>Solicitar cita
            </a>
        </div>

        <div class="mt-6 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
            <article th:each="especialidad : ${especialidades}" class="rounded-3xl border border-gray-200 bg-gray-50 p-6 transition hover:border-brand hover:bg-brand/10">
                <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white text-ink shadow-sm">
                    <i data-lucide="stethoscope" class="h-5 w-5"></i>
                </div>
                <h3 class="mt-5 text-2xl font-bold text-ink" th:text="${especialidad.nombre}">Medicina General</h3>
                <p class="mt-3 min-h-16 text-sm leading-6 text-muted" th:text="${especialidad.descripcion}">Atención integral y presencial.</p>
                <a th:href="@{/paciente/solicitar-cita}" class="mt-6 inline-flex items-center gap-2 text-sm font-semibold text-ink">
                    Solicitar cita
                    <i data-lucide="arrow-right" class="h-4 w-4"></i>
                </a>
            </article>
        </div>
    </article>
</section>
</html>
