<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/paciente-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
                <h2 class="text-2xl font-bold text-ink">Mis Pagos</h2>
                <p class="mt-1 text-sm text-muted">Historial de pagos por tus citas medicas.</p>
            </div>
        </div>

        <div class="mt-6 space-y-4">
            <div th:if="${#lists.isEmpty(pagos)}" class="rounded-2xl border border-dashed border-gray-200 p-6 text-sm text-muted">
                No tienes pagos registrados por el momento.
            </div>
            <div th:each="pago : ${pagos}" class="rounded-3xl border border-gray-200 bg-white p-5 shadow-sm">
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div class="flex-1">
                        <div class="flex items-center gap-3">
                            <h3 class="text-lg font-bold text-ink" th:text="${pago.cita.especialidad.nombre}">Especialidad</h3>
                            <span th:if="${pago.estado.name() == 'PENDIENTE'}"
                                class="rounded-full bg-yellow-100 px-3 py-1 text-xs font-semibold text-yellow-800">Pendiente</span>
                            <span th:if="${pago.estado.name() == 'APROBADO'}"
                                class="rounded-full bg-green-100 px-3 py-1 text-xs font-semibold text-green-800">Aprobado</span>
                            <span th:if="${pago.estado.name() == 'RECHAZADO'}"
                                class="rounded-full bg-red-100 px-3 py-1 text-xs font-semibold text-red-800">Rechazado</span>
                        </div>
                        <p class="mt-1 text-sm text-muted">
                            <span th:text="${pago.cita.doctor.usuario.nombres} + ' ' + ${pago.cita.doctor.usuario.apellidos}"></span>
                            &middot;
                            <span th:text="${#temporals.format(pago.cita.fechaCita, 'dd/MM/yyyy')}"></span>
                            &middot;
                            <span th:text="${#temporals.format(pago.cita.horaInicio, 'HH:mm')} + ' - ' + ${#temporals.format(pago.cita.horaFin, 'HH:mm')}"></span>
                        </p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xl font-bold text-ink" th:text="'S/ ' + ${#numbers.formatDecimal(pago.monto, 0, 'COMMA', 2, 'POINT')}">S/ 50.00</span>
                        <form th:if="${pago.estado.name() == 'PENDIENTE'}" th:action="@{'/paciente/pagar-cita/' + ${pago.cita.id}}" method="post">
                            <button type="submit"
                                class="inline-flex items-center gap-2 rounded-xl bg-[#009EE3] px-4 py-2 font-semibold text-white transition hover:bg-[#0089C7]">
                                <i data-lucide="credit-card" class="h-4 w-4"></i>Pagar con MP
                            </button>
                        </form>
                        <span th:if="${pago.estado.name() == 'APROBADO'}"
                            class="inline-flex items-center gap-2 rounded-xl bg-green-100 px-4 py-2 font-semibold text-green-700">
                            <i data-lucide="check-circle" class="h-4 w-4"></i>Pagado
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </article>
</section>
</html>
