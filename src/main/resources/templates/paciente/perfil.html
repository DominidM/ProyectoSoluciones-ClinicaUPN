<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/paciente-layout :: layout(~{::section})}">
<section>
    <div class="max-w-4xl space-y-4">
        <a th:href="@{/paciente/inicio}" class="inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="overflow-hidden rounded-3xl border border-gray-200 bg-white shadow-sm">
            <div class="bg-carbon px-8 py-10 text-white">
                <div class="flex flex-col items-center text-center">
                    <div class="flex h-20 w-20 items-center justify-center rounded-full bg-brand text-3xl font-bold text-carbon" th:text="${paciente.usuario.iniciales}">LR</div>
                    <h2 class="mt-5 text-3xl font-bold" th:text="${paciente.usuario.nombreCompleto}">Lucía Ramírez Soto</h2>
                    <p class="mt-2 text-gray-300" th:text="${paciente.usuario.correo}">lucia.ramirez@gmail.com</p>
                    <span class="mt-4 inline-flex rounded-full bg-brand/20 px-3 py-1 text-xs font-semibold text-brand">PACIENTE</span>
                </div>
            </div>
            <div class="p-8">
                <div class="grid gap-4 md:grid-cols-2">
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">DNI</p><p class="mt-2 font-semibold text-ink" th:text="${paciente.usuario.dni}">74123456</p></div>
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Teléfono</p><p class="mt-2 font-semibold text-ink" th:text="${paciente.usuario.telefono}">921345678</p></div>
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Estado</p><div class="mt-2"><span th:replace="~{layout/fragments/badges :: estado(${paciente.estado})}"></span></div></div>
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Fecha de registro</p><p class="mt-2 font-semibold text-ink" th:text="${#temporals.format(paciente.usuario.fechaCreacion, 'dd/MM/yyyy')}">10/01/2024</p></div>
                    <div class="rounded-2xl bg-gray-50 p-4 md:col-span-2"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Dirección</p><p class="mt-2 font-semibold text-ink" th:text="${paciente.direccion}">Av. Los Rosales 234, Trujillo</p></div>
                </div>
                <div class="mt-6 rounded-2xl border border-yellow-200 bg-yellow-50 px-4 py-3 text-sm text-yellow-700">Tu perfil es de solo lectura. Cualquier actualización debe gestionarse mediante administración.</div>
            </div>
        </article>
    </div>
</section>
</html>
