<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/doctor-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <h2 class="text-2xl font-bold text-ink">Mis Citas</h2>
        <p class="mt-1 text-sm text-muted">Historial completo de tu agenda clínica.</p>
        <div class="mt-6 space-y-4">
            <div th:if="${#lists.isEmpty(citas)}" class="rounded-2xl border border-dashed border-gray-200 p-6 text-sm text-muted">No tienes citas registradas.</div>
            <article th:each="cita : ${citas}" class="rounded-3xl border border-gray-200 bg-white p-5 shadow-sm">
                <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                    <div>
                        <div class="flex items-center gap-3">
                            <h3 class="text-xl font-bold text-ink" th:text="${cita.especialidad.nombre}">Medicina General</h3>
                            <span th:replace="~{layout/fragments/badges :: cita(${cita.estado})}"></span>
                        </div>
                        <p class="mt-2 text-sm text-muted" th:text="${cita.paciente.usuario.nombreCompleto}">Paciente</p>
                        <p class="mt-1 text-sm text-muted" th:text="${cita.motivo}">Motivo</p>
                    </div>
                    <div class="space-y-2 text-sm text-muted">
                        <p th:text="${#temporals.format(cita.fechaCita, 'dd/MM/yyyy')}">20/01/2025</p>
                        <p th:text="${#temporals.format(cita.horaInicio, 'HH:mm')} + ' - ' + ${#temporals.format(cita.horaFin, 'HH:mm')}">09:00 - 09:30</p>
                        <p th:text="${cita.consultorio.nombre}">Consultorio 101</p>
                    </div>
                </div>
                <div class="mt-4 flex flex-wrap gap-3">
                    <a th:href="@{/doctor/historia/{id}(id=${cita.paciente.id})}" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-ink transition hover:bg-gray-50">Ver historia</a>
                    <a th:if="${cita.atencionClinica == null}" th:href="@{/doctor/atenciones/nueva/{id}(id=${cita.id})}" class="rounded-xl bg-[#F5C518] px-4 py-2 text-sm font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Registrar atención</a>
                </div>
            </article>
        </div>
    </article>
</section>
</html>
