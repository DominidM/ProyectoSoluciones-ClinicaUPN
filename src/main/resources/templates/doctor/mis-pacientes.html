<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/doctor-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <h2 class="text-2xl font-bold text-ink">Mis Pacientes</h2>
        <p class="mt-1 text-sm text-muted">Pacientes que tuvieron al menos una cita contigo.</p>
        <div class="mt-6 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
            <div th:if="${#lists.isEmpty(pacientes)}" class="rounded-2xl border border-dashed border-gray-200 p-6 text-sm text-muted">No hay pacientes asociados todavía.</div>
            <article th:each="paciente : ${pacientes}" class="rounded-2xl border border-gray-200 bg-gray-50 p-5">
                <div class="flex items-center gap-4">
                    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-brand/20 font-bold text-ink" th:text="${paciente.usuario.iniciales}">LR</div>
                    <div>
                        <h3 class="font-semibold text-ink" th:text="${paciente.usuario.nombreCompleto}">Paciente</h3>
                        <p class="text-sm text-muted" th:text="${paciente.edad} + ' años · ' + ${paciente.sexo}">28 años</p>
                    </div>
                </div>
                <div class="mt-4 grid gap-2 text-sm text-muted">
                    <p th:text="${paciente.usuario.dni}">74123456</p>
                    <p th:text="${paciente.usuario.telefono}">921345678</p>
                    <p class="line-clamp-2" th:text="${paciente.direccion}">Dirección</p>
                </div>
                <div class="mt-5 flex gap-3">
                    <a th:href="@{/doctor/historia/{id}(id=${paciente.id})}" class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-ink transition hover:bg-white">Historia</a>
                </div>
            </article>
        </div>
    </article>
</section>
</html>
