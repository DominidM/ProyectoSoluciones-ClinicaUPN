<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sectionTitle(title, subtitle)">
    <h2 class="text-2xl font-bold text-ink" th:text="${title}">Título</h2>
    <p class="mt-1 text-sm text-muted" th:text="${subtitle}">Descripción</p>
</div>

<div th:fragment="primaryButton(label)">
    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]" th:text="${label}">Guardar</button>
</div>
</html>
