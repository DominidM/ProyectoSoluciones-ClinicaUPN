<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="modal" data-confirm-modal class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-xl">
        <div class="mb-4 flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-full bg-red-100 text-red-600">
                <i data-lucide="triangle-alert" class="h-5 w-5"></i>
            </div>
            <div>
                <h3 class="text-lg font-semibold">Confirmar eliminación</h3>
                <p class="text-sm text-muted">Esta acción no se puede deshacer.</p>
            </div>
        </div>
        <p data-confirm-message class="mb-6 text-sm text-ink">¿Estás seguro de que deseas eliminar este registro?</p>
        <div class="flex justify-end gap-3">
            <button type="button" data-confirm-cancel class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium hover:bg-gray-100 transition">Cancelar</button>
            <button type="button" data-confirm-submit class="rounded-xl bg-red-500 px-4 py-2 text-sm font-semibold text-white hover:bg-red-600 transition">Confirmar eliminación</button>
        </div>
    </div>
</div>
</html>
