<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<aside th:fragment="sidebar" class="app-sidebar flex h-full min-h-screen flex-col bg-carbon text-white">
    <div class="flex items-center gap-3 border-b border-white/10 px-5 py-5">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand text-carbon">
            <i data-lucide="heart-pulse" class="h-5 w-5"></i>
        </div>
        <div>
            <p class="font-semibold">Clínica UPN</p>
            <p class="text-sm text-gray-300">Administrador</p>
        </div>
    </div>
    <nav class="flex-1 space-y-1 px-3 py-4 text-sm">
        <a th:href="@{/admin/dashboard}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${rutaActual == '/admin/dashboard'} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="layout-dashboard" class="h-4 w-4"></i>Dashboard</a>
        <a th:href="@{/admin/usuarios}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/usuarios')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="users" class="h-4 w-4"></i>Usuarios</a>
        <a th:href="@{/admin/pacientes}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/pacientes')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="user-round" class="h-4 w-4"></i>Pacientes</a>
        <a th:href="@{/admin/doctores}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/doctores')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="stethoscope" class="h-4 w-4"></i>Doctores</a>
        <a th:href="@{/admin/practicantes}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/practicantes')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="graduation-cap" class="h-4 w-4"></i>Practicantes</a>
        <a th:href="@{/admin/especialidades}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/especialidades')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="book-open" class="h-4 w-4"></i>Especialidades</a>
        <a th:href="@{/admin/consultorios}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/consultorios')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="building-2" class="h-4 w-4"></i>Consultorios</a>
        <a th:href="@{/admin/horarios}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/horarios')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="calendar-days" class="h-4 w-4"></i>Horarios Médicos</a>
        <a th:href="@{/admin/citas}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/citas')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="calendar-plus" class="h-4 w-4"></i>Citas</a>
        <a th:href="@{/admin/atenciones}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/atenciones') || #strings.startsWith(rutaActual, '/admin/historias')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="activity" class="h-4 w-4"></i>Atenciones Clínicas</a>
        <a th:href="@{/admin/evaluaciones}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/evaluaciones')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="star" class="h-4 w-4"></i>Evaluaciones</a>
        <a th:href="@{/admin/reportes}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/reportes')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="bar-chart-3" class="h-4 w-4"></i>Reportes</a>
        <a th:href="@{/admin/perfil}" class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-white/10 transition" th:classappend="${#strings.startsWith(rutaActual, '/admin/perfil')} ? ' bg-brand/15 font-semibold text-brand'"><i data-lucide="user-circle-2" class="h-4 w-4"></i>Perfil</a>
    </nav>
    <div class="border-t border-white/10 px-4 py-4">
        <div class="mb-4 flex items-center gap-3 rounded-2xl bg-white/5 p-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-brand text-carbon font-semibold"
                 th:text="${usuarioActual != null ? usuarioActual.iniciales : 'AD'}">AD</div>
            <div class="min-w-0">
                <p class="truncate font-semibold" th:text="${usuarioActual != null ? usuarioActual.nombreCompleto : 'Administrador'}">Administrador</p>
                <p class="text-xs text-gray-300">Administrador</p>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left text-sm font-medium hover:bg-white/10 transition">
                <i data-lucide="log-out" class="h-4 w-4"></i>Cerrar sesión
            </button>
        </form>
    </div>
</aside>
</html>
