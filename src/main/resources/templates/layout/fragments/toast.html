<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="toast" th:if="${toastMensaje}" data-toast
     class="fixed right-5 top-5 z-50 rounded-2xl border border-gray-200 bg-white px-5 py-4 shadow-lg">
    <div class="flex items-start gap-3">
        <div class="flex h-9 w-9 items-center justify-center rounded-full"
             th:classappend="${toastTipo == 'error'} ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'">
            <i th:attr="data-lucide=${toastTipo == 'error'} ? 'circle-alert' : 'check-circle-2'" class="h-5 w-5"></i>
        </div>
        <div>
            <p class="font-semibold" th:text="${toastTipo == 'error'} ? 'Error' : 'Éxito'">Éxito</p>
            <p class="text-sm text-muted" th:text="${toastMensaje}">Operación realizada</p>
        </div>
    </div>
</div>
</html>
