<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head th:replace="~{layout/fragments/internal-header :: head(${pageTitle})}"></head>
<body class="bg-gray-100 text-ink" data-theme-scope="internal">
<div class="min-h-screen lg:flex">
    <aside th:replace="~{layout/fragments/admin-sidebar :: sidebar}"></aside>
    <div class="min-w-0 flex-1">
        <div th:replace="~{layout/fragments/internal-header :: topbar(${pageTitle}, ${pageDescription})}"></div>
        <main class="min-w-0 overflow-x-hidden p-4 md:p-6">
            <div th:insert="${content}"></div>
            <div th:replace="~{layout/fragments/pagination :: pagination}"></div>
        </main>
    </div>
</div>
<div th:replace="~{layout/fragments/toast :: toast}"></div>
<div th:replace="~{layout/fragments/modal-confirmacion :: modal}"></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
