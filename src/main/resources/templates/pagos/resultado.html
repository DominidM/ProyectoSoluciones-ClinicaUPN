<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/paciente-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm text-center">
        <div th:if="${param.collection_status == null or param.collection_status[0] == 'approved'}">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
                <i data-lucide="check-circle" class="h-8 w-8 text-green-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-ink">Pago exitoso</h2>
            <p class="mt-2 text-muted">Tu pago ha sido procesado correctamente. Puedes ver el detalle en la seccion Mis Pagos.</p>
            <div class="mt-6 flex justify-center gap-4">
                <a th:href="@{/paciente/mis-pagos}" class="rounded-xl bg-carbon px-6 py-2 font-semibold text-white transition hover:bg-gray-800">Ir a Mis Pagos</a>
                <a th:href="@{/paciente/inicio}" class="rounded-xl border border-gray-300 px-6 py-2 font-semibold text-ink transition hover:bg-gray-50">Volver al inicio</a>
            </div>
        </div>
        <div th:if="${param.collection_status != null and param.collection_status[0] != 'approved'}">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-yellow-100">
                <i data-lucide="clock" class="h-8 w-8 text-yellow-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-ink">Pago en proceso</h2>
            <p class="mt-2 text-muted">Tu pago esta siendo procesado. Te notificaremos cuando se confirme.</p>
            <div class="mt-6 flex justify-center gap-4">
                <a th:href="@{/paciente/mis-pagos}" class="rounded-xl bg-carbon px-6 py-2 font-semibold text-white transition hover:bg-gray-800">Ir a Mis Pagos</a>
                <a th:href="@{/paciente/inicio}" class="rounded-xl border border-gray-300 px-6 py-2 font-semibold text-ink transition hover:bg-gray-50">Volver al inicio</a>
            </div>
        </div>
    </article>
</section>
</html>
