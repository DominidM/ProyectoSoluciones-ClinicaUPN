<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/practicante-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <h2 class="text-2xl font-bold text-ink">Mis Asignaciones</h2>
        <p class="mt-1 text-sm text-muted">Citas y actividades vinculadas al doctor supervisor.</p>
        <div class="mt-6 space-y-4">
            <div th:if="${#lists.isEmpty(asignaciones)}" class="rounded-2xl border border-dashed border-gray-200 p-6 text-sm text-muted">No hay asignaciones visibles por ahora.</div>
            <article th:each="cita : ${asignaciones}" class="flex items-center justify-between gap-4 rounded-2xl border border-gray-200 bg-white p-5 shadow-sm">
                <div>
                    <p class="font-semibold text-ink" th:text="${cita.paciente.usuario.nombreCompleto}">Paciente</p>
                    <p class="mt-1 text-sm text-muted" th:text="${cita.doctor.usuario.nombreCompleto} + ' · ' + ${cita.especialidad.nombre}">Doctor</p>
                    <p class="mt-1 text-sm text-muted" th:text="${#temporals.format(cita.fechaCita, 'dd/MM/yyyy')} + ' · ' + ${#temporals.format(cita.horaInicio, 'HH:mm')} + ' · ' + ${cita.consultorio.nombre}">Fecha</p>
                </div>
                <span th:replace="~{layout/fragments/badges :: cita(${cita.estado})}"></span>
            </article>
        </div>
    </article>
</section>
</html>
