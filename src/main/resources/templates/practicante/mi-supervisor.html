<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/practicante-layout :: layout(~{::section})}">
<section>
    <article class="max-w-4xl rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <h2 class="text-2xl font-bold text-ink">Mi Supervisor</h2>
        <p class="mt-1 text-sm text-muted">Información de referencia del doctor asignado.</p>
        <div th:if="${supervisor == null}" class="mt-6 rounded-2xl border border-dashed border-gray-200 p-6 text-sm text-muted">Aún no tienes un doctor supervisor asignado.</div>
        <div th:if="${supervisor != null}" class="mt-6 overflow-hidden rounded-3xl border border-gray-200">
            <div class="bg-carbon px-8 py-10 text-white">
                <div class="flex flex-col items-center text-center">
                    <div class="flex h-20 w-20 items-center justify-center rounded-full bg-brand text-3xl font-bold text-carbon" th:text="${supervisor.usuario.iniciales}">DC</div>
                    <h3 class="mt-5 text-3xl font-bold" th:text="${supervisor.usuario.nombreCompleto}">Dr. Supervisor</h3>
                    <p class="mt-2 text-brand font-semibold" th:text="${supervisor.especialidad.nombre}">Especialidad</p>
                    <p class="mt-1 text-gray-300" th:text="${supervisor.cmp}">CMP</p>
                </div>
            </div>
            <div class="grid gap-4 p-6 md:grid-cols-2">
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Correo</p><p class="mt-2 font-semibold text-ink" th:text="${supervisor.usuario.correo}">correo</p></div>
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Teléfono</p><p class="mt-2 font-semibold text-ink" th:text="${supervisor.usuario.telefono}">987654321</p></div>
                <div class="rounded-2xl bg-gray-50 p-4 md:col-span-2"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Experiencia</p><p class="mt-2 font-semibold text-ink" th:text="${supervisor.experiencia}">12 años</p></div>
            </div>
        </div>
    </article>
</section>
</html>
