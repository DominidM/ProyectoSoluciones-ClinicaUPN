<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/practicante-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <h2 class="text-2xl font-bold text-ink">Atenciones donde Participé</h2>
        <p class="mt-1 text-sm text-muted">Registro clínico de atenciones asociadas a tu participación.</p>
        <div class="mt-6 space-y-4">
            <div th:if="${#lists.isEmpty(atenciones)}" class="rounded-2xl border border-dashed border-gray-200 p-6 text-sm text-muted">No hay atenciones participadas registradas.</div>
            <article th:each="atencion : ${atenciones}" class="rounded-3xl border border-gray-200 bg-white p-5 shadow-sm">
                <div class="flex items-center justify-between gap-4">
                    <div>
                        <h3 class="text-xl font-bold text-ink" th:text="${atencion.historiaClinica.paciente.usuario.nombreCompleto}">Paciente</h3>
                        <p class="mt-1 text-sm text-muted" th:text="${atencion.doctor.usuario.nombreCompleto} + ' · ' + ${#temporals.format(atencion.fechaAtencion, 'dd/MM/yyyy')}">Doctor</p>
                    </div>
                    <span class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700" th:text="${atencion.cita.especialidad.nombre}">Especialidad</span>
                </div>
                <div class="mt-4 grid gap-4 md:grid-cols-2">
                    <div><p class="text-xs font-semibold uppercase tracking-wide text-muted">Diagnóstico</p><p class="mt-1 text-sm text-ink" th:text="${atencion.diagnostico}">Diagnóstico</p></div>
                    <div><p class="text-xs font-semibold uppercase tracking-wide text-muted">Tratamiento</p><p class="mt-1 text-sm text-ink" th:text="${atencion.tratamiento}">Tratamiento</p></div>
                </div>
            </article>
        </div>
    </article>
</section>
</html>
