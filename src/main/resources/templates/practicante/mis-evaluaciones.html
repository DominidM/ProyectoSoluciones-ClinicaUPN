<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/practicante-layout :: layout(~{::section})}">
<section class="space-y-6">
    <div class="grid gap-4 md:grid-cols-3">
        <article class="rounded-3xl border border-gray-200 bg-white p-6 text-center shadow-sm"><p class="text-sm text-muted">Promedio general</p><p class="mt-2 text-4xl font-bold text-ink" th:text="${#numbers.formatDecimal(promedio, 1, 1)} + '/20'">17.0/20</p></article>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 text-center shadow-sm"><p class="text-sm text-muted">Total evaluaciones</p><p class="mt-2 text-4xl font-bold text-ink" th:text="${#lists.size(evaluaciones)}">1</p></article>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 text-center shadow-sm"><p class="text-sm text-muted">Mayor puntaje</p><p class="mt-2 text-4xl font-bold text-green-600" th:text="${#lists.isEmpty(evaluaciones) ? 0 : evaluaciones[0].puntaje} + '/20'">17/20</p></article>
    </div>

    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <h2 class="text-2xl font-bold text-ink">Historial Completo</h2>
        <div class="mt-6 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
                <thead>
                <tr class="border-b border-gray-100 text-muted">
                    <th class="px-4 py-3 font-semibold">Fecha</th>
                    <th class="px-4 py-3 font-semibold">Doctor supervisor</th>
                    <th class="px-4 py-3 font-semibold">Puntaje</th>
                    <th class="px-4 py-3 font-semibold">Estado</th>
                    <th class="px-4 py-3 font-semibold">Comentario</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(evaluaciones)}">
                    <td colspan="5" class="px-4 py-8 text-center text-muted">No hay evaluaciones disponibles.</td>
                </tr>
                <tr th:each="evaluacion : ${evaluaciones}" class="border-b border-gray-100 last:border-0">
                    <td class="px-4 py-4 text-muted" th:text="${#temporals.format(evaluacion.fechaEvaluacion, 'yyyy-MM-dd')}">2025-01-15</td>
                    <td class="px-4 py-4 font-medium text-ink" th:text="${evaluacion.doctorSupervisor.usuario.nombreCompleto}">Supervisor</td>
                    <td class="px-4 py-4"><span th:replace="~{layout/fragments/badges :: puntaje(${evaluacion.puntaje})}"></span></td>
                    <td class="px-4 py-4">
                        <span class="inline-flex rounded-full px-3 py-1 text-xs font-semibold"
                              th:classappend="${evaluacion.resultado == 'Aprobado'} ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'"
                              th:text="${evaluacion.resultado}">Aprobado</span>
                    </td>
                    <td class="px-4 py-4 text-muted" th:text="${evaluacion.comentario}">Comentario</td>
                </tr>
                </tbody>
            </table>
        </div>
    </article>
</section>
</html>
