<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
                <h2 class="text-2xl font-bold text-ink">Consultorios</h2>
                <p class="mt-1 text-sm text-muted">Ambientes clínicos asociados a especialidades.</p>
            </div>
            <a th:href="@{/admin/consultorios/nuevo}" class="inline-flex items-center gap-2 rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">
                <i data-lucide="plus" class="h-4 w-4"></i>Agregar consultorio
            </a>
        </div>

        <form method="get" class="mt-6 grid gap-3 lg:grid-cols-4">
            <input type="text" name="q" th:value="${filtroQ}" placeholder="Buscar por nombre o número"
                   class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
            <select name="especialidadId" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                <option value="">Todas las especialidades</option>
                <option th:each="especialidad : ${especialidades}" th:value="${especialidad.id}" th:text="${especialidad.nombre}" th:selected="${filtroEspecialidad == especialidad.id}"></option>
            </select>
            <select name="estado" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                <option value="">Todos los estados</option>
                <option value="true" th:selected="${filtroEstado == true}">Activos</option>
                <option value="false" th:selected="${filtroEstado == false}">Inactivos</option>
            </select>
            <button class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Aplicar filtros</button>
        </form>

        <div class="mt-6 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
                <thead>
                <tr class="border-b border-gray-100 text-muted">
                    <th class="px-4 py-3 font-semibold">Nombre</th>
                    <th class="px-4 py-3 font-semibold">Número</th>
                    <th class="px-4 py-3 font-semibold">Piso</th>
                    <th class="px-4 py-3 font-semibold">Especialidad</th>
                    <th class="px-4 py-3 font-semibold">Estado</th>
                    <th class="px-4 py-3 font-semibold">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(consultorios)}">
                    <td colspan="6" class="px-4 py-8 text-center text-muted">No se encontraron consultorios.</td>
                </tr>
                <tr th:each="consultorio : ${consultorios}" class="border-b border-gray-100 last:border-0">
                    <td class="px-4 py-4 font-medium text-ink" th:text="${consultorio.nombre}">Consultorio 101</td>
                    <td class="px-4 py-4 text-muted" th:text="${consultorio.numero}">101</td>
                    <td class="px-4 py-4 text-muted" th:text="${consultorio.piso}">1</td>
                    <td class="px-4 py-4 text-muted" th:text="${consultorio.especialidad.nombre}">Medicina General</td>
                    <td class="px-4 py-4"><span th:replace="~{layout/fragments/badges :: estado(${consultorio.estado})}"></span></td>
                    <td class="px-4 py-4">
                        <div class="flex flex-wrap gap-3">
                            <a th:href="@{/admin/consultorios/editar/{id}(id=${consultorio.id})}" class="text-sm font-semibold text-blue-600">Editar</a>
                            <form th:id="'eliminar-consultorio-' + ${consultorio.id}" th:action="@{/admin/consultorios/eliminar/{id}(id=${consultorio.id})}" method="post"></form>
                            <button type="button"
                                    class="text-sm font-semibold text-red-500"
                                    th:attr="data-confirm-target='eliminar-consultorio-' + ${consultorio.id},data-confirm-message='¿Estás seguro de que deseas eliminar este consultorio?'">
                                Eliminar
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </article>
</section>
</html>
