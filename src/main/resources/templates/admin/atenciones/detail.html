<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-5xl space-y-4">
        <a th:href="@{/admin/atenciones}" class="inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                <div>
                    <h2 class="text-3xl font-bold text-ink" th:text="${atencion.historiaClinica.paciente.usuario.nombreCompleto}">Paciente</h2>
                    <p class="mt-2 text-sm text-muted" th:text="${atencion.doctor.usuario.nombreCompleto} + (${atencion.practicante != null} ? ' · Practicante: ' + atencion.practicante.usuario.nombreCompleto : '')">Doctor</p>
                </div>
                <span class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700" th:text="${atencion.cita.especialidad.nombre}">Medicina General</span>
            </div>
            <div class="mt-6 grid gap-5 md:grid-cols-2">
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Fecha</p><p class="mt-2 text-sm font-semibold text-ink" th:text="${#temporals.format(atencion.fechaAtencion, 'dd/MM/yyyy HH:mm')}">20/01/2025</p></div>
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Cita</p><p class="mt-2 text-sm font-semibold text-ink" th:text="'#' + ${atencion.cita.id} + ' · ' + ${#temporals.format(atencion.cita.fechaCita, 'dd/MM/yyyy')}">#1</p></div>
                <div class="rounded-2xl bg-gray-50 p-4 md:col-span-2"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Motivo de consulta</p><p class="mt-2 text-sm text-ink" th:text="${atencion.motivoConsulta}">Motivo</p></div>
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Diagnóstico</p><p class="mt-2 text-sm text-ink" th:text="${atencion.diagnostico}">Diagnóstico</p></div>
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Tratamiento</p><p class="mt-2 text-sm text-ink" th:text="${atencion.tratamiento}">Tratamiento</p></div>
                <div class="rounded-2xl bg-gray-50 p-4 md:col-span-2"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Observaciones</p><p class="mt-2 text-sm text-ink" th:text="${atencion.observaciones}">Observaciones</p></div>
            </div>
        </article>
    </div>
</section>
</html>
