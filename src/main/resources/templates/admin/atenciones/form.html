<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-5xl">
        <a th:href="@{/admin/atenciones}" class="mb-4 inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-3xl font-bold text-ink" th:text="${pageTitle}">Registrar atención</h2>
            <p class="mt-1 text-sm text-muted">Completa el registro clínico asociado a la cita seleccionada.</p>
            <div th:if="${errorGeneral}" class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:text="${errorGeneral}"></div>

            <div class="mt-6 rounded-2xl border border-gray-200 bg-gray-50 p-4">
                <p class="font-semibold text-ink" th:text="${cita.paciente.usuario.nombreCompleto}">Paciente</p>
                <p class="mt-1 text-sm text-muted" th:text="${cita.doctor.usuario.nombreCompleto} + ' · ' + ${cita.especialidad.nombre} + ' · ' + ${#temporals.format(cita.fechaCita, 'dd/MM/yyyy')} + ' ' + ${#temporals.format(cita.horaInicio, 'HH:mm')}">Cita</p>
            </div>

            <form th:object="${atencionForm}" th:action="${formAction}" method="post" class="mt-6 space-y-5">
                <input type="hidden" th:field="*{citaId}">
                <div class="grid gap-5 md:grid-cols-2">
                    <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Practicante participante</label><select th:field="*{practicanteId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Sin practicante</option><option th:each="practicante : ${practicantes}" th:value="${practicante.id}" th:text="${practicante.usuario.nombreCompleto} + ' · ' + ${practicante.codigoUniversitario}"></option></select></div>
                    <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Motivo de consulta *</label><textarea rows="4" th:field="*{motivoConsulta}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"></textarea><p th:if="${#fields.hasErrors('motivoConsulta')}" th:errors="*{motivoConsulta}" class="mt-1 text-sm text-red-500"></p></div>
                    <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Diagnóstico *</label><textarea rows="4" th:field="*{diagnostico}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"></textarea><p th:if="${#fields.hasErrors('diagnostico')}" th:errors="*{diagnostico}" class="mt-1 text-sm text-red-500"></p></div>
                    <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Tratamiento *</label><textarea rows="4" th:field="*{tratamiento}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"></textarea><p th:if="${#fields.hasErrors('tratamiento')}" th:errors="*{tratamiento}" class="mt-1 text-sm text-red-500"></p></div>
                    <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Observaciones</label><textarea rows="4" th:field="*{observaciones}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"></textarea></div>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Guardar atención</button>
                    <a th:href="@{/admin/atenciones}" class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Cancelar</a>
                </div>
            </form>
        </article>
    </div>
</section>
</html>
