<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <div>
            <h2 class="text-2xl font-bold text-ink">Atenciones Clínicas</h2>
            <p class="mt-1 text-sm text-muted">Registro histórico de atenciones generadas desde citas presenciales.</p>
        </div>
        <div class="mt-6 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
                <thead>
                <tr class="border-b border-gray-100 text-muted">
                    <th class="px-4 py-3 font-semibold">Paciente</th>
                    <th class="px-4 py-3 font-semibold">Doctor</th>
                    <th class="px-4 py-3 font-semibold">Practicante</th>
                    <th class="px-4 py-3 font-semibold">Especialidad</th>
                    <th class="px-4 py-3 font-semibold">Fecha</th>
                    <th class="px-4 py-3 font-semibold">Diagnóstico</th>
                    <th class="px-4 py-3 font-semibold">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(atenciones)}">
                    <td colspan="7" class="px-4 py-8 text-center text-muted">No hay atenciones registradas.</td>
                </tr>
                <tr th:each="atencion : ${atenciones}" class="border-b border-gray-100 last:border-0">
                    <td class="px-4 py-4 font-medium text-ink" th:text="${atencion.historiaClinica.paciente.usuario.nombreCompleto}">Paciente</td>
                    <td class="px-4 py-4 text-muted" th:text="${atencion.doctor.usuario.nombreCompleto}">Doctor</td>
                    <td class="px-4 py-4 text-muted" th:text="${atencion.practicante != null ? atencion.practicante.usuario.nombreCompleto : '—'}">Practicante</td>
                    <td class="px-4 py-4 text-muted" th:text="${atencion.cita.especialidad.nombre}">Especialidad</td>
                    <td class="px-4 py-4 text-muted" th:text="${#temporals.format(atencion.fechaAtencion, 'yyyy-MM-dd')}">2025-01-20</td>
                    <td class="px-4 py-4 text-muted line-clamp-2" th:text="${atencion.diagnostico}">Diagnóstico</td>
                    <td class="px-4 py-4"><a th:href="@{/admin/atenciones/ver/{id}(id=${atencion.id})}" class="text-sm font-semibold text-[#1F2937]">Ver detalle</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </article>
</section>
</html>
