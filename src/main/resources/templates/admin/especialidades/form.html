<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-4xl">
        <a th:href="@{/admin/especialidades}" class="mb-4 inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-3xl font-bold text-ink" th:text="${pageTitle}">Nueva especialidad</h2>
            <p class="mt-1 text-sm text-muted">Define la oferta clínica visible en el sistema.</p>
            <div th:if="${errorGeneral}" class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:text="${errorGeneral}"></div>

            <form th:object="${especialidadForm}" th:action="${formAction}" method="post" class="mt-6 space-y-5">
                <div>
                    <label class="mb-2 block text-sm font-semibold text-ink">Nombre *</label>
                    <input id="nombre" th:field="*{nombre}" maxlength="100"
                           class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                    <div class="mt-2 flex items-center justify-between text-sm">
                        <p th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="text-red-500">Error</p>
                        <span th:unless="${#fields.hasErrors('nombre')}" class="text-muted"></span>
                        <p class="text-muted"><span data-char-count-for="nombre">0</span>/100 caracteres</p>
                    </div>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-semibold text-ink">Descripción</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="4" maxlength="200"
                              class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"></textarea>
                    <div class="mt-2 flex items-center justify-between text-sm">
                        <p th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}" class="text-red-500">Error</p>
                        <span th:unless="${#fields.hasErrors('descripcion')}" class="text-muted"></span>
                        <p class="text-muted"><span data-char-count-for="descripcion">0</span>/200 caracteres</p>
                    </div>
                </div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Estado *</label><select th:field="*{estado}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option th:value="true">Activo</option><option th:value="false">Inactivo</option></select></div>
                <div class="flex flex-wrap gap-3">
                    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Guardar especialidad</button>
                    <a th:href="@{/admin/especialidades}" class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Cancelar</a>
                </div>
            </form>
        </article>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            function bindCounter(fieldId, maxLength) {
                const field = document.getElementById(fieldId);
                const counter = document.querySelector(`[data-char-count-for="${fieldId}"]`);

                if (!field || !counter) {
                    return;
                }

                function updateCounter() {
                    if (field.value.length > maxLength) {
                        field.value = field.value.slice(0, maxLength);
                    }
                    counter.textContent = field.value.length.toString();
                }

                field.addEventListener('input', updateCounter);
                field.addEventListener('paste', function () {
                    requestAnimationFrame(updateCounter);
                });

                updateCounter();
            }

            bindCounter('nombre', 100);
            bindCounter('descripcion', 200);
        });
    </script>
</section>
</html>
