<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-4xl space-y-4">
        <a th:href="@{/admin/citas}" class="inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                <div>
                    <h2 class="text-3xl font-bold text-ink" th:text="${cita.especialidad.nombre}">Medicina General</h2>
                    <p class="mt-2 text-muted" th:text="${cita.paciente.usuario.nombreCompleto} + ' con ' + ${cita.doctor.usuario.nombreCompleto}">Paciente con doctor</p>
                </div>
                <span th:replace="~{layout/fragments/badges :: cita(${cita.estado})}"></span>
            </div>
            <div class="mt-6 grid gap-4 md:grid-cols-2">
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Fecha</p><p class="mt-2 font-semibold text-ink" th:text="${#temporals.format(cita.fechaCita, 'dd/MM/yyyy')}">20/01/2025</p></div>
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Hora</p><p class="mt-2 font-semibold text-ink" th:text="${#temporals.format(cita.horaInicio, 'HH:mm')} + ' - ' + ${#temporals.format(cita.horaFin, 'HH:mm')}">09:00 - 09:30</p></div>
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Consultorio</p><p class="mt-2 font-semibold text-ink" th:text="${cita.consultorio.nombre}">Consultorio 101</p></div>
                <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Motivo</p><p class="mt-2 font-semibold text-ink" th:text="${cita.motivo}">Motivo</p></div>
            </div>
            <div class="mt-6 flex flex-wrap gap-3">
                <a th:if="${cita.atencionClinica == null}" th:href="@{/admin/atenciones/nueva/{id}(id=${cita.id})}" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Registrar atención</a>
            </div>
        </article>
    </div>
</section>
</html>
