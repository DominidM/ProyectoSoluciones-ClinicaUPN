<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-5xl">
        <a th:href="@{/admin/citas}" class="mb-4 inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-3xl font-bold text-ink" th:text="${pageTitle}">Nueva cita</h2>
            <p class="mt-1 text-sm text-muted">Programa una cita presencial para cualquier paciente.</p>
            <div th:if="${errorGeneral}" class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:text="${errorGeneral}"></div>

            <form th:object="${citaForm}" th:action="${formAction}" method="post" class="mt-6 grid gap-5 md:grid-cols-2">
                <div><label class="mb-2 block text-sm font-semibold text-ink">Paciente *</label><select th:field="*{pacienteId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona un paciente</option><option th:each="paciente : ${pacientes}" th:value="${paciente.id}" th:text="${paciente.usuario.nombreCompleto} + ' · ' + ${paciente.usuario.dni}"></option></select></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Especialidad *</label><select th:field="*{especialidadId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona una especialidad</option><option th:each="especialidad : ${especialidades}" th:value="${especialidad.id}" th:text="${especialidad.nombre}"></option></select><p th:if="${#fields.hasErrors('especialidadId')}" th:errors="*{especialidadId}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Doctor *</label><select th:field="*{doctorId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona un doctor</option><option th:each="doctor : ${doctores}" th:value="${doctor.id}" th:text="${doctor.usuario.nombreCompleto} + ' · ' + ${doctor.especialidad.nombre}"></option></select><p th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Consultorio *</label><select th:field="*{consultorioId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona un consultorio</option><option th:each="consultorio : ${consultorios}" th:value="${consultorio.id}" th:text="${consultorio.nombre} + ' · Piso ' + ${consultorio.piso}"></option></select></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Fecha *</label><input type="date" th:field="*{fechaCita}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('fechaCita')}" th:errors="*{fechaCita}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Estado *</label><select th:field="*{estado}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option th:each="estadoItem : ${estados}" th:value="${estadoItem}" th:text="${estadoItem}"></option></select></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Hora inicio *</label><input type="time" th:field="*{horaInicio}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('horaInicio')}" th:errors="*{horaInicio}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Hora fin *</label><input type="time" th:field="*{horaFin}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('horaFin')}" th:errors="*{horaFin}" class="mt-1 text-sm text-red-500"></p></div>
                <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Motivo de consulta</label><textarea rows="4" th:field="*{motivo}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"></textarea></div>
                <div class="md:col-span-2 flex flex-wrap gap-3">
                    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Guardar cita</button>
                    <a th:href="@{/admin/citas}" class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Cancelar</a>
                </div>
            </form>
        </article>
    </div>
</section>
</html>
