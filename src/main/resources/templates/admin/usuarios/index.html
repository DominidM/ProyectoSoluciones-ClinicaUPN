<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section class="space-y-6">
    <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
                <h2 class="text-2xl font-bold text-ink">Usuarios</h2>
                <p class="mt-1 text-sm text-muted">Gestiona credenciales y accesos internos del sistema.</p>
            </div>
            <a th:href="@{/admin/usuarios/nuevo}" class="inline-flex items-center gap-2 rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">
                <i data-lucide="plus" class="h-4 w-4"></i>Agregar usuario
            </a>
        </div>

        <form method="get" class="mt-6 grid gap-3 lg:grid-cols-4">
            <input type="text" name="q" th:value="${filtroQ}" placeholder="Buscar por DNI, nombre o correo"
                   class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
            <select name="rol" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                <option value="">Todos los roles</option>
                <option th:each="rolItem : ${roles}" th:value="${rolItem.nombre}" th:text="${rolItem.nombre}" th:selected="${filtroRol != null and filtroRol.name() == rolItem.nombre.name()}"></option>
            </select>
            <select name="estado" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                <option value="">Todos los estados</option>
                <option value="true" th:selected="${filtroEstado == true}">Activos</option>
                <option value="false" th:selected="${filtroEstado == false}">Inactivos</option>
            </select>
            <button class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Aplicar filtros</button>
        </form>

        <div class="mt-6 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
                <thead>
                <tr class="border-b border-gray-100 text-muted">
                    <th class="px-4 py-3 font-semibold">Nombre completo</th>
                    <th class="px-4 py-3 font-semibold">DNI</th>
                    <th class="px-4 py-3 font-semibold">Correo</th>
                    <th class="px-4 py-3 font-semibold">Teléfono</th>
                    <th class="px-4 py-3 font-semibold">Rol</th>
                    <th class="px-4 py-3 font-semibold">Estado</th>
                    <th class="px-4 py-3 font-semibold">Fecha creación</th>
                    <th class="px-4 py-3 font-semibold">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="8" class="px-4 py-8 text-center text-muted">No se encontraron usuarios.</td>
                </tr>
                <tr th:each="usuario : ${usuarios}" class="border-b border-gray-100 last:border-0">
                    <td class="px-4 py-4 font-medium text-ink" th:text="${usuario.nombreCompleto}">Usuario</td>
                    <td class="px-4 py-4 text-muted" th:text="${usuario.dni}">00000000</td>
                    <td class="px-4 py-4 text-muted" th:text="${usuario.correo}">correo</td>
                    <td class="px-4 py-4 text-muted" th:text="${usuario.telefono}">999999999</td>
                    <td class="px-4 py-4">
                        <span class="inline-flex rounded-full bg-brand/20 px-3 py-1 text-xs font-semibold text-ink" th:text="${usuario.rol.nombre}">ADMIN</span>
                    </td>
                    <td class="px-4 py-4"><span th:replace="~{layout/fragments/badges :: estado(${usuario.estado})}"></span></td>
                    <td class="px-4 py-4 text-muted" th:text="${#temporals.format(usuario.fechaCreacion, 'yyyy-MM-dd')}">2025-01-01</td>
                    <td class="px-4 py-4">
                        <div class="flex flex-wrap gap-3">
                            <a th:href="@{/admin/usuarios/ver/{id}(id=${usuario.id})}" class="text-sm font-semibold text-[#1F2937]">Ver</a>
                            <a th:href="@{/admin/usuarios/editar/{id}(id=${usuario.id})}" class="text-sm font-semibold text-blue-600">Editar</a>
                            <form th:id="'eliminar-usuario-' + ${usuario.id}" th:action="@{/admin/usuarios/eliminar/{id}(id=${usuario.id})}" method="post"></form>
                            <button type="button"
                                    class="text-sm font-semibold text-red-500"
                                    th:attr="data-confirm-target='eliminar-usuario-' + ${usuario.id},data-confirm-message='¿Estás seguro de que deseas eliminar este usuario?'">
                                Eliminar
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </article>
</section>
</html>
