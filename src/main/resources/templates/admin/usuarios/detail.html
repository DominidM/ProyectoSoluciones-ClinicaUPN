<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-4xl space-y-4">
        <a th:href="@{/admin/usuarios}" class="inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="overflow-hidden rounded-3xl border border-gray-200 bg-white shadow-sm">
            <div class="bg-carbon px-8 py-10 text-white">
                <div class="flex flex-col items-center text-center">
                    <div class="flex h-20 w-20 items-center justify-center rounded-full bg-brand text-3xl font-bold text-carbon" th:text="${usuario.iniciales}">AD</div>
                    <h2 class="mt-5 text-3xl font-bold" th:text="${usuario.nombreCompleto}">Nombre</h2>
                    <p class="mt-2 text-gray-300" th:text="${usuario.correo}">correo</p>
                    <span class="mt-4 inline-flex rounded-full bg-white/10 px-4 py-1 text-sm font-semibold" th:text="${usuario.rol.nombre}">ADMIN</span>
                </div>
            </div>
            <div class="p-8">
                <div class="grid gap-4 md:grid-cols-2">
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">DNI</p><p class="mt-2 font-semibold text-ink" th:text="${usuario.dni}">00000000</p></div>
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Teléfono</p><p class="mt-2 font-semibold text-ink" th:text="${usuario.telefono}">999999999</p></div>
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Estado</p><div class="mt-2"><span th:replace="~{layout/fragments/badges :: estado(${usuario.estado})}"></span></div></div>
                    <div class="rounded-2xl bg-gray-50 p-4"><p class="text-xs font-semibold uppercase tracking-wide text-muted">Fecha de creación</p><p class="mt-2 font-semibold text-ink" th:text="${#temporals.format(usuario.fechaCreacion, 'dd/MM/yyyy HH:mm')}">fecha</p></div>
                </div>
            </div>
        </article>
    </div>
</section>
</html>
