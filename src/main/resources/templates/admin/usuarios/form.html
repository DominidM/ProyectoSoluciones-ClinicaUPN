<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-4xl">
        <a th:href="@{/admin/usuarios}" class="mb-4 inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-3xl font-bold text-ink" th:text="${pageTitle}">Nuevo usuario</h2>
            <p class="mt-1 text-sm text-muted">Completa la información principal del usuario.</p>

            <div th:if="${errorGeneral}" class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:text="${errorGeneral}"></div>

            <form th:object="${usuarioForm}" th:action="${formAction}" method="post" class="mt-6 space-y-5">
                <div class="grid gap-5 md:grid-cols-2">
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">DNI *</label>
                        <input th:field="*{dni}" th:readonly="${modoEdicion}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518] read-only:bg-gray-50 read-only:text-muted">
                        <p th:if="${modoEdicion}" class="mt-1 text-xs text-muted">El DNI no se puede modificar una vez creado el usuario.</p>
                        <p th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">Rol *</label>
                        <select th:field="*{rol}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                            <option value="">Selecciona un rol</option>
                            <option th:each="rolItem : ${roles}" th:value="${rolItem.nombre}" th:text="${rolItem.nombre}"></option>
                        </select>
                        <p th:if="${#fields.hasErrors('rol')}" th:errors="*{rol}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">Nombres *</label>
                        <input th:field="*{nombres}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                        <p th:if="${#fields.hasErrors('nombres')}" th:errors="*{nombres}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">Apellidos *</label>
                        <input th:field="*{apellidos}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                        <p th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">Correo *</label>
                        <input type="email" th:field="*{correo}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                        <p th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">Teléfono</label>
                        <input th:field="*{telefono}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">Contraseña</label>
                        <input type="password" th:field="*{password}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                        <p class="mt-1 text-xs text-muted">Déjala vacía solo si deseas conservar la actual.</p>
                        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-1 text-sm text-red-500"></p>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-semibold text-ink">Estado *</label>
                        <select th:field="*{estado}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]">
                            <option th:value="true">Activo</option>
                            <option th:value="false">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-wrap gap-3">
                    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Guardar usuario</button>
                    <a th:href="@{/admin/usuarios}" class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Cancelar</a>
                </div>
            </form>
        </article>
    </div>
</section>
</html>
