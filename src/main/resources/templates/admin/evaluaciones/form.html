<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-4xl">
        <a th:href="@{/admin/evaluaciones}" class="mb-4 inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-3xl font-bold text-ink" th:text="${pageTitle}">Nueva evaluación</h2>
            <p class="mt-1 text-sm text-muted">Registra la evaluación académica de un practicante.</p>
            <div th:if="${errorGeneral}" class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:text="${errorGeneral}"></div>

            <form th:object="${evaluacionForm}" th:action="${formAction}" method="post" class="mt-6 grid gap-5 md:grid-cols-2">
                <div><label class="mb-2 block text-sm font-semibold text-ink">Practicante *</label><select th:field="*{practicanteId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona un practicante</option><option th:each="practicante : ${practicantes}" th:value="${practicante.id}" th:text="${practicante.usuario.nombreCompleto} + ' · ' + ${practicante.codigoUniversitario}"></option></select><p th:if="${#fields.hasErrors('practicanteId')}" th:errors="*{practicanteId}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Doctor supervisor *</label><select th:field="*{doctorSupervisorId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona un doctor</option><option th:each="doctor : ${doctores}" th:value="${doctor.id}" th:text="${doctor.usuario.nombreCompleto}"></option></select><p th:if="${#fields.hasErrors('doctorSupervisorId')}" th:errors="*{doctorSupervisorId}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Fecha *</label><input type="date" th:field="*{fechaEvaluacion}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('fechaEvaluacion')}" th:errors="*{fechaEvaluacion}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Puntaje (0-20) *</label><input type="number" step="0.01" min="0" max="20" th:field="*{puntaje}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('puntaje')}" th:errors="*{puntaje}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Estado *</label><select th:field="*{estado}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option th:value="true">Activo</option><option th:value="false">Inactivo</option></select></div>
                <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Comentario</label><textarea rows="4" th:field="*{comentario}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"></textarea></div>
                <div class="md:col-span-2 flex flex-wrap gap-3">
                    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Guardar evaluación</button>
                    <a th:href="@{/admin/evaluaciones}" class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Cancelar</a>
                </div>
            </form>
        </article>
    </div>
</section>
</html>
