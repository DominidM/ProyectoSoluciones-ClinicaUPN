<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-4xl">
        <a th:href="@{/admin/horarios}" class="mb-4 inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-3xl font-bold text-ink" th:text="${pageTitle}">Nuevo horario</h2>
            <p class="mt-1 text-sm text-muted">Define turnos de atención disponibles por doctor.</p>
            <div th:if="${errorGeneral}" class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:text="${errorGeneral}"></div>

            <form th:object="${horarioForm}" th:action="${formAction}" method="post" class="mt-6 grid gap-5 md:grid-cols-2">
                <div class="md:col-span-2"><label class="mb-2 block text-sm font-semibold text-ink">Doctor *</label><select th:field="*{doctorId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona un doctor</option><option th:each="doctor : ${doctores}" th:value="${doctor.id}" th:text="${doctor.usuario.nombreCompleto} + ' · ' + ${doctor.especialidad.nombre}"></option></select><p th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Día *</label><select th:field="*{diaSemana}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona un día</option><option th:each="dia : ${diasSemana}" th:value="${dia}" th:text="${dia}"></option></select><p th:if="${#fields.hasErrors('diaSemana')}" th:errors="*{diaSemana}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Estado *</label><select th:field="*{estado}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option th:value="true">Activo</option><option th:value="false">Inactivo</option></select></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Hora inicio *</label><input type="time" th:field="*{horaInicio}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('horaInicio')}" th:errors="*{horaInicio}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Hora fin *</label><input type="time" th:field="*{horaFin}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('horaFin')}" th:errors="*{horaFin}" class="mt-1 text-sm text-red-500"></p></div>
                <div class="md:col-span-2 flex flex-wrap gap-3">
                    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Guardar horario</button>
                    <a th:href="@{/admin/horarios}" class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Cancelar</a>
                </div>
            </form>
        </article>
    </div>
</section>
</html>
