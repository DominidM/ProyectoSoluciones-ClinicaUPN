<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="max-w-5xl">
        <a th:href="@{/admin/practicantes}" class="mb-4 inline-flex items-center gap-2 text-sm text-muted transition hover:text-ink">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>Volver
        </a>
        <article class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-3xl font-bold text-ink" th:text="${pageTitle}">Nuevo practicante</h2>
            <p class="mt-1 text-sm text-muted">Registra practicantes y su relación con el supervisor asignado.</p>
            <div th:if="${errorGeneral}" class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:text="${errorGeneral}"></div>

            <form th:object="${practicanteForm}" th:action="${formAction}" method="post" class="mt-6 grid gap-5 md:grid-cols-2">
                <div><label class="mb-2 block text-sm font-semibold text-ink">Código universitario *</label><input th:field="*{codigoUniversitario}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('codigoUniversitario')}" th:errors="*{codigoUniversitario}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Ciclo *</label><input th:field="*{ciclo}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('ciclo')}" th:errors="*{ciclo}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Nombres *</label><input th:field="*{nombres}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('nombres')}" th:errors="*{nombres}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Apellidos *</label><input th:field="*{apellidos}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">DNI *</label><input th:field="*{dni}" th:readonly="${modoEdicion}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518] read-only:bg-gray-50 read-only:text-muted"><p th:if="${modoEdicion}" class="mt-1 text-xs text-muted">El DNI no se puede modificar una vez creado el practicante.</p><p th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Correo *</label><input type="email" th:field="*{correo}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Teléfono *</label><input th:field="*{telefono}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Contraseña</label><input type="password" th:field="*{password}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><p class="mt-1 text-xs text-muted">Si queda vacía, se conserva la actual o se usará `123456` en nuevos registros.</p><p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Especialidad *</label><select th:field="*{especialidadId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option value="">Selecciona una especialidad</option><option th:each="especialidad : ${especialidades}" th:value="${especialidad.id}" th:text="${especialidad.nombre}"></option></select><p th:if="${#fields.hasErrors('especialidadId')}" th:errors="*{especialidadId}" class="mt-1 text-sm text-red-500"></p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Doctor supervisor</label><select th:field="*{doctorSupervisorId}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]" data-supervisor-select><option value="">Sin asignar</option><option th:each="doctor : ${doctores}" th:value="${doctor.id}" th:attr="data-especialidad-id=${doctor.especialidad.id}" th:text="${doctor.usuario.nombreCompleto}"></option></select><p class="mt-1 text-xs text-muted" data-supervisor-help>Selecciona una especialidad para ver sus doctores.</p></div>
                <div><label class="mb-2 block text-sm font-semibold text-ink">Estado *</label><select th:field="*{estado}" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#F5C518]"><option th:value="true">Activo</option><option th:value="false">Inactivo</option></select></div>
                <div class="md:col-span-2 flex flex-wrap gap-3">
                    <button type="submit" class="rounded-xl bg-[#F5C518] px-4 py-2 font-semibold text-[#1F2937] transition hover:bg-[#E8B800]">Guardar practicante</button>
                    <a th:href="@{/admin/practicantes}" class="rounded-xl border border-gray-300 px-4 py-2 font-medium text-ink transition hover:bg-gray-50">Cancelar</a>
                </div>
            </form>
        </article>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const especialidadSelect = document.getElementById('especialidadId');
            const supervisorSelect = document.querySelector('[data-supervisor-select]');
            const supervisorHelp = document.querySelector('[data-supervisor-help]');

            if (!especialidadSelect || !supervisorSelect) {
                return;
            }

            const supervisorOptions = Array.from(supervisorSelect.options);

            function syncSupervisorOptions() {
                const selectedEspecialidad = especialidadSelect.value;
                let visibleDoctors = 0;

                supervisorOptions.forEach(function (option) {
                    if (!option.value) {
                        option.hidden = false;
                        return;
                    }

                    const matches = selectedEspecialidad && option.dataset.especialidadId === selectedEspecialidad;
                    option.hidden = !matches;
                    option.disabled = !matches;

                    if (matches) {
                        visibleDoctors += 1;
                    }
                });

                const selectedOption = supervisorSelect.selectedOptions[0];
                if (selectedOption && selectedOption.value && selectedOption.disabled) {
                    supervisorSelect.value = '';
                }

                if (supervisorHelp) {
                    if (!selectedEspecialidad) {
                        supervisorHelp.textContent = 'Selecciona una especialidad para ver sus doctores.';
                    } else if (visibleDoctors === 0) {
                        supervisorHelp.textContent = 'No hay doctores activos para esta especialidad.';
                    } else {
                        supervisorHelp.textContent = visibleDoctors === 1
                                ? '1 doctor disponible para esta especialidad.'
                                : visibleDoctors + ' doctores disponibles para esta especialidad.';
                    }
                }
            }

            especialidadSelect.addEventListener('change', syncSupervisorOptions);
            syncSupervisorOptions();
        });
    </script>
</section>
</html>
