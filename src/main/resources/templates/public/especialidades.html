<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/public-layout :: layout(~{::section})}">
<section class="bg-gray-50 py-16">
    <div class="mx-auto max-w-7xl px-4 md:px-6">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-bold">Nuestras Especialidades</h1>
            <p class="mt-3 text-muted">Contamos con profesionales certificados en áreas de atención clínica presencial.</p>
        </div>
        <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
            <article th:each="especialidad : ${especialidades}" class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
                <div class="mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-brand/10 text-brand">
                    <i data-lucide="sparkles" class="h-5 w-5"></i>
                </div>
                <h2 class="text-2xl font-semibold" th:text="${especialidad.nombre}">Especialidad</h2>
                <p class="mt-3 text-sm leading-6 text-muted" th:text="${especialidad.descripcion}">Descripción</p>
                <a th:href="@{/registro}" class="mt-6 inline-flex items-center gap-2 font-semibold text-ink hover:text-brand transition">
                    Solicitar cita
                    <i data-lucide="arrow-right" class="h-4 w-4"></i>
                </a>
            </article>
        </div>
    </div>
</section>
</html>
