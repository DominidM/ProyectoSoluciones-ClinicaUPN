<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/auth-layout :: layout(~{::section})}">
<section class="mx-auto max-w-lg rounded-3xl border border-gray-200 bg-white p-8 text-center shadow-sm">
    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-green-100 text-green-600">
        <i data-lucide="check-circle-2" class="h-8 w-8"></i>
    </div>
    <h1 class="text-4xl font-bold">Registro exitoso</h1>
    <p class="mt-3 text-muted">Tu cuenta fue creada correctamente como paciente. Ya puedes iniciar sesión para solicitar tu primera cita.</p>
    <div class="mt-8 flex flex-wrap justify-center gap-3">
        <a th:href="@{/login}" class="rounded-xl bg-brand px-5 py-3 font-semibold text-carbon transition hover:bg-brand-hover">Ir al login</a>
        <a th:href="@{/}" class="rounded-xl border border-gray-300 px-5 py-3 font-semibold text-ink transition hover:bg-gray-100">Volver al inicio</a>
    </div>
</section>
</html>
